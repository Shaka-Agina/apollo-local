# Copy to slskd.yml and fill in. Docs: https://github.com/slskd/slskd/blob/master/docs/config.md

soulseek:
  username: your_soulseek_username
  password: your_soulseek_password
  listen_port: 50300

web:
  authentication:
    # API key used by Apollo (set the same value in .env.local as SLSKD_API_KEY)
    api_keys:
      apollo:
        key: change_me_to_a_long_random_string
        role: readwrite

directories:
  downloads: /app/downloads
  incomplete: /app/incomplete

shares:
  directories:
    - /app/shared
